<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>القرآن الكريم | جميع القراء</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--text:#ffffff;
--accent:#22c55e;
}

body.light{
--bg:#f8fafc;
--card:#e5e7eb;
--text:#000;
}

body{
margin:0;
font-family:Tahoma,Arial;
background:var(--bg);
color:var(--text);
transition:.3s;
}

header{
background:var(--card);
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
max-width:600px;
margin:auto;
}

select,button{
width:100%;
padding:10px;
margin:6px 0;
font-size:16px;
border-radius:6px;
border:none;
}

button{
background:var(--accent);
cursor:pointer;
}

audio{
width:100%;
margin-top:10px;
}

.progress{
height:20px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:var(--accent);
width:0%;
}

.theme{
position:fixed;
left:10px;
bottom:10px;
}

</style>
</head>

<body>

<header>📖 القرآن الكريم – صدقة جارية</header>

<div class="container">

<select id="reciter"></select>

<select id="moshaf"></select>

<select id="surah"></select>

<button onclick="play()">▶ تشغيل</button>

<button onclick="autoPlay()">🔁 ختمة تلقائية</button>

<button onclick="download()">⬇ تحميل السورة</button>

<audio id="player" controls></audio>

<h3>📊 عداد الختمة</h3>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<button class="theme" onclick="toggleTheme()">🌙 / ☀️</button>

<script>

// الوضع الليلي
const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches

if(!localStorage.theme){
if(!prefersDark)document.body.classList.add("light")
}else if(localStorage.theme==="light"){
document.body.classList.add("light")
}

function toggleTheme(){
document.body.classList.toggle("light")
localStorage.theme=document.body.classList.contains("light")?"light":"dark"
}

// أسماء السور
const surahs=[
"الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
"هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
"الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
"لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
"فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
"الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
"الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
"نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
"التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
"الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
"القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
"المسد","الإخلاص","الفلق","الناس"
]

const surahSelect=document.getElementById("surah")

surahs.forEach((name,i)=>{
surahSelect.innerHTML+=`<option value="${i+1}">${i+1} - ${name}</option>`
})

// عداد الختمة
let count=localStorage.khatma||0
updateBar()

function updateBar(){
document.getElementById("bar").style.width=(count/114*100)+"%"
}

// القراء
const reciterSelect=document.getElementById("reciter")
const moshafSelect=document.getElementById("moshaf")

let recitersData=[]

fetch("https://api.mp3quran.net/api/v3/reciters")
.then(r=>r.json())
.then(data=>{

recitersData=data.reciters

recitersData.forEach((r,i)=>{
reciterSelect.innerHTML+=`<option value="${i}">${r.name}</option>`
})

loadMoshaf()

})

reciterSelect.onchange=loadMoshaf

function loadMoshaf(){

const r=recitersData[reciterSelect.value]

moshafSelect.innerHTML=""

r.moshaf.forEach((m,i)=>{
moshafSelect.innerHTML+=`<option value="${i}">${m.name}</option>`
})

}

// تشغيل
const player=document.getElementById("player")

function pad(n){
return n.toString().padStart(3,"0")
}

function play(){

const r=recitersData[reciterSelect.value]
const m=r.moshaf[moshafSelect.value]

const url=m.server+pad(surahSelect.value)+".mp3"

player.src=url

player.play()

}

// ختمة تلقائية
function autoPlay(){

let i=parseInt(surahSelect.value)||1

play()

player.onended=()=>{

count++

localStorage.khatma=count

updateBar()

if(++i<=114){

surahSelect.value=i

play()

}

}

}

// تحميل
function download(){
window.open(player.src,"_blank")
}

</script>

</body>
  </html>
